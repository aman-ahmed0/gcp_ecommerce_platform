apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  cluster-pods.json: |
    {
      "title": "Cluster Pod Resources",
      "uid": "cluster-pods",
      "panels": [
        {
          "title": "CPU Usage per Pod (all namespaces)",
          "type": "graph",
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{container!=\"\", container!=\"POD\"}[1m])) by (namespace, pod)",
              "legendFormat": "{{namespace}}/{{pod}}"
            }
          ],
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
        },
        {
          "title": "Memory Usage per Pod (all namespaces)",
          "type": "graph",
          "targets": [
            {
              "expr": "sum(container_memory_usage_bytes{container!=\"\", container!=\"POD\"}) by (namespace, pod)",
              "legendFormat": "{{namespace}}/{{pod}}"
            }
          ],
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
        }
      ]
    }