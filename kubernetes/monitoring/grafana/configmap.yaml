apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  dashboard.json: |
    {
      "title": "Kubernetes Pod Resources",
      "uid": "pod-resources",
      "panels": [
        {
          "title": "CPU Usage per Pod",
          "type": "graph",
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"ecommerce\"}[1m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
        },
        {
          "title": "Memory Usage per Pod",
          "type": "graph",
          "targets": [
            {
              "expr": "sum(container_memory_usage_bytes{namespace=\"ecommerce\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
        }
      ]
    }